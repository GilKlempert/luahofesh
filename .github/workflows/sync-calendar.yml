name: Sync family calendar

# מסנכרן את היומן מגוגל לקובץ calendar.ics בריפו
on:
  schedule:
    - cron: "0 * * * *"      # כל שעה עגולה
  workflow_dispatch:          # מאפשר הרצה ידנית מכפתור ב-GitHub

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download calendar
        run: |
          curl -sSL \
            "https://calendar.google.com/calendar/ical/family04930625314444082438%40group.calendar.google.com/public/basic.ics" \
            -o calendar.ics
          echo "Downloaded $(wc -c < calendar.ics) bytes, $(grep -c 'BEGIN:VEVENT' calendar.ics) events"

      - name: Commit if changed
        run: |
          git config user.name  "calendar-bot"
          git config user.email "actions@github.com"
          if git status --porcelain | grep -q calendar.ics; then
            git add calendar.ics
            git commit -m "Update calendar $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "No changes."
          fi
